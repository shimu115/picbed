server:
  port: 8080

spring:
  application:
    name: picbed-server
  datasource:
    url: jdbc:h2:file:./data/picbed;DB_CLOSE_DELAY=-1;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
  servlet:
    multipart:
      max-file-size: 20MB

aliyun:
  oss:
    endpoint: oss-cn-hangzhou.aliyuncs.com
    access-key-id: your-access-key-id
    access-key-secret: your-access-key-secret
    bucket-name: your-bucket-name

app:
  upload:
    max-file-size: 20971520
